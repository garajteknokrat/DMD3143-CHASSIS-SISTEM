<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<title>UJIAN 1 - DMD 3143 Vehicle Chassis System II (LEGO Mission)</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  :root{
    --lego-red:#d9291c;
    --lego-yellow:#f7c400;
    --lego-blue:#0a63c9;
    --lego-green:#00a651;
    --lego-black:#1b1b1b;
    --lego-grey:#e8e8e8;
    --stud:#ffffff33;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:'Segoe UI', Verdana, sans-serif;
    background:linear-gradient(180deg,#bfe3ff 0%, #eaf6ff 40%, #fdf3d8 100%);
    color:#222;
    min-height:100vh;
  }
  .wrap{max-width:760px;margin:0 auto;padding:16px 14px 60px;}

  /* Brick building blocks look */
  .brick{
    position:relative;
    background:var(--lego-yellow);
    border-radius:10px;
    padding:20px 18px 18px;
    margin-bottom:18px;
    box-shadow:0 6px 0 #b58c00, 0 8px 14px rgba(0,0,0,.15);
    border:3px solid #d9a900;
  }
  .brick.red{background:var(--lego-red);border-color:#8f150c;box-shadow:0 6px 0 #8f150c,0 8px 14px rgba(0,0,0,.15);color:#fff;}
  .brick.blue{background:var(--lego-blue);border-color:#053e82;box-shadow:0 6px 0 #053e82,0 8px 14px rgba(0,0,0,.15);color:#fff;}
  .brick.green{background:var(--lego-green);border-color:#00632f;box-shadow:0 6px 0 #00632f,0 8px 14px rgba(0,0,0,.15);color:#fff;}
  .brick.white{background:#ffffff;border-color:#cfcfcf;box-shadow:0 6px 0 #cfcfcf,0 8px 14px rgba(0,0,0,.15);}

  .studs{display:flex;gap:8px;position:absolute;top:-14px;left:18px;}
  .stud{width:20px;height:20px;border-radius:50%;background:inherit;filter:brightness(1.15);border:2px solid rgba(0,0,0,.15);}

  h1,h2,h3{margin:.2em 0;}
  .title-banner{
    text-align:center;
    background:var(--lego-red);
    color:#fff;
    padding:18px 14px 22px;
    border-radius:14px;
    margin-bottom:20px;
    box-shadow:0 6px 0 #8f150c, 0 10px 18px rgba(0,0,0,.2);
    position:relative;
  }
  .title-banner .studs{left:50%;transform:translateX(-50%);top:-14px;}
  .title-banner h1{font-size:1.4em;letter-spacing:.5px;}
  .title-banner p{margin:4px 0 0;font-size:.85em;opacity:.95;}

  .progress-outer{
    background:#fff;
    border-radius:10px;
    padding:8px 10px;
    margin-bottom:18px;
    box-shadow:0 3px 8px rgba(0,0,0,.12);
    display:flex;align-items:center;gap:10px;
  }
  .tower{display:flex;flex-direction:column-reverse;gap:3px;height:70px;justify-content:flex-start;width:38px;}
  .tower-brick{height:10px;border-radius:3px;background:var(--lego-grey);border:1px solid #ccc;}
  .tower-brick.filled{background:var(--lego-green);border-color:#00632f;}
  .progress-info{flex:1;}
  .progress-bar-bg{background:#eee;border-radius:20px;height:16px;overflow:hidden;margin-top:4px;}
  .progress-bar-fill{background:linear-gradient(90deg,var(--lego-green),#5be07f);height:100%;width:0%;transition:width .4s;}
  .points-badge{
    background:var(--lego-yellow);
    border:2px solid #b58c00;
    border-radius:20px;
    padding:6px 14px;
    font-weight:bold;
    white-space:nowrap;
  }

  .qimg{max-width:100%;border-radius:8px;border:3px solid #fff;box-shadow:0 3px 10px rgba(0,0,0,.25);margin:10px 0;display:block;}
  .badge-mark{
    display:inline-block;background:rgba(0,0,0,.2);
    padding:3px 10px;border-radius:12px;font-size:.8em;font-weight:bold;margin-left:6px;
  }
  label.sub{display:block;font-weight:600;margin:10px 0 4px;}
  input[type=text], textarea{
    width:100%;padding:10px 12px;border-radius:8px;border:none;
    font-family:inherit;font-size:1em;
    box-shadow:inset 0 0 0 2px rgba(0,0,0,.12);
    background:#fff;
  }
  textarea{min-height:110px;resize:vertical;}
  .row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
  @media(max-width:480px){.row3{grid-template-columns:1fr;} .row2{grid-template-columns:1fr;}}

  .btn{
    display:inline-block;
    background:var(--lego-blue);color:#fff;border:none;
    padding:12px 22px;border-radius:10px;font-size:1em;font-weight:bold;
    cursor:pointer;box-shadow:0 4px 0 #053e82;
    transition:transform .08s;
  }
  .btn:active{transform:translateY(3px);box-shadow:0 1px 0 #053e82;}
  .btn.green{background:var(--lego-green);box-shadow:0 4px 0 #00632f;}
  .btn.red{background:var(--lego-red);box-shadow:0 4px 0 #8f150c;}
  .btn.grey{background:#888;box-shadow:0 4px 0 #555;}
  .btn:disabled{opacity:.5;cursor:not-allowed;}
  .btn-row{display:flex;justify-content:space-between;gap:10px;margin-top:16px;}

  .start-screen input{margin-bottom:10px;}
  .lego-figure{font-size:3em;text-align:center;margin:6px 0;}

  .notice{
    background:#fff3cd;border:2px dashed #d9a900;border-radius:10px;
    padding:12px 14px;font-size:.92em;
  }
  .section-label{
    display:inline-block;background:var(--lego-black);color:#fff;
    padding:4px 14px;border-radius:20px;font-size:.8em;font-weight:bold;margin-bottom:10px;
  }
  .final-summary{background:#fff;border-radius:12px;padding:18px;box-shadow:0 4px 14px rgba(0,0,0,.15);}
  .final-summary h2{color:var(--lego-red);}
  .qa-item{border-bottom:1px solid #eee;padding:10px 0;}
  .qa-item b{color:var(--lego-blue);}
  footer{text-align:center;font-size:.75em;color:#666;margin-top:20px;}
  .hidden{display:none !important;}
  .confetti-msg{font-size:1.1em;text-align:center;margin-bottom:10px;}
</style>
</head>

const TOTAL_MARKS = QUESTIONS.reduce((s,q)=>s+q.markah,0);

// ---------- BACKEND (Google Apps Script) ----------
// GANTI URL DI BAWAH SELEPAS DEPLOY GOOGLE APPS SCRIPT (lihat arahan setup)
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzQI_qwtaih6XiXIGmtFJa_rvz_vZxu36tzHV_8Zbw1YnwcavVdvJ5yOT7gM-EsBcfhtQ/exec";

function buildPayload(){
  const a = state.answers;
  const get = (i)=> a[i];
  const arr = (i,idx)=> (Array.isArray(a[i]) ? (a[i][idx]||"") : "");
  return {
    nama: state.student.nama,
    angka: state.student.angka,
    totalPoints: pointsEarned(),
    answeredCount: answeredCount(),
    answers: {
      q1a_1: arr(0,0), q1a_2: arr(0,1), q1a_3: arr(0,2),
      q1b: get(1)||"",
      q2_225: arr(2,0), q2_50: arr(2,1), q2_r: arr(2,2), q2_16: arr(2,3),
      qb1: get(3)||"",
      qb2: get(4)||"",
      qb3_clip: arr(5,0), qb3_lekat: arr(5,1),
      qb4: get(6)||"",
      qb5a: get(7)||"",
      qb5b: get(8)||""
    }
  };
}

function base64ToBlob(base64, mime){
  const byteChars = atob(base64);
  const byteNumbers = new Array(byteChars.length);
  for(let i=0;i<byteChars.length;i++) byteNumbers[i] = byteChars.charCodeAt(i);
  const byteArray = new Uint8Array(byteNumbers);
  return new Blob([byteArray], {type:mime});
}

async function hantarKeGoogleSheet(){
  saveCurrentAnswer();
  if(APPS_SCRIPT_URL.indexOf("PASTE_URL")>-1){
    alert("Backend belum disambungkan lagi. Guru perlu masukkan URL Apps Script dalam kod (APPS_SCRIPT_URL) dahulu.");
    return;
  }
  const btn = document.getElementById('btnHantar');
  if(btn){ btn.disabled = true; btn.textContent = "⏳ Menghantar..."; }
  try{
    const payload = buildPayload();
    const res = await fetch(APPS_SCRIPT_URL, {
      method: "POST",
      headers: { "Content-Type": "text/plain;charset=utf-8" }, // elak CORS preflight pada Apps Script
      body: JSON.stringify(payload)
    });
    const json = await res.json();
    if(json.status === "ok"){
      const blob = base64ToBlob(json.pdfBase64, "application/pdf");
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = "UJIAN1_DMD3143_" + (state.student.nama||"pelajar").replace(/[^a-z0-9]+/gi,'_') + "_RASMI.pdf";
      document.body.appendChild(a); a.click(); a.remove();
      URL.revokeObjectURL(url);
      alert("✅ Jawapan berjaya direkod dalam Google Sheet! Dokumen rasmi sedang dimuat turun.");
    } else {
      alert("Ralat backend: " + json.message);
    }
  }catch(err){
    alert("Gagal hubungi backend: " + err.message + "\n\nSemak semula APPS_SCRIPT_URL dan sambungan internet.");
  }finally{
    if(btn){ btn.disabled = false; btn.textContent = "☁️ Hantar & Muat Turun Dokumen Rasmi"; }
  }
}

// ---------- STATE ----------
let state = {
  screen:"start",
  qIndex:0,
  student:{nama:"", angka:""},
  answers:{} // qIndex -> value(s)
};

const app = document.getElementById('app');

function pointsEarned(){
  // 10 stud points per markah answered (non-empty)
  let pts = 0;
  QUESTIONS.forEach((q,i)=>{
    if(isAnswered(i)) pts += q.markah*10;
  });
  return pts;
}
function isAnswered(i){
  const a = state.answers[i];
  if(!a) return false;
  if(Array.isArray(a)) return a.some(x=>x && x.trim().length>0);
  return a.trim().length>0;
}
function answeredCount(){
  let c=0; QUESTIONS.forEach((q,i)=>{ if(isAnswered(i)) c++; });
  return c;
}

function render(){
  if(state.screen==="start") return renderStart();
  if(state.screen==="quiz") return renderQuiz();
  if(state.screen==="final") return renderFinal();
}

function renderStart(){

    <div class="title-banner">

      <h1>🧱 MISI BENGKEL: TAYAR &amp; RODA</h1>
      <p>UJIAN 1 · DMD 3143 Vehicle Chassis System II</p>
    </div>
    <div class="brick white start-screen">
      <div class="studs"><div class="stud"></div><div class="stud"></div></div>
      <div class="lego-figure">👷‍♂️🔧🚗</div>
      <p style="text-align:center">Selamat datang, jurutera muda! Selesaikan <b>${QUESTIONS.length} misi soalan</b>
      merangkumi tayar, wheel balancing dan wheel alignment untuk kumpul <b>Lego Stud Points</b>.</p>
      <label class="sub">Nama Calon</label>
      <input type="text" id="inpNama" placeholder="Nama penuh anda">

function startQuiz(){
  const nama = document.getElementById('inpNama').value.trim();
  const angka = document.getElementById('inpAngka').value.trim();
  if(!nama){ alert("Sila masukkan nama dahulu, bro!"); return; }
  state.student.nama = nama;
  state.student.angka = angka;
  state.screen="quiz";
  state.qIndex=0;
  render();
}

function bgClassForIndex(i){
  const colors=["red","blue","green",""];
  return colors[i % colors.length];
}

function renderProgress(){
  const total = QUESTIONS.length;
  const done = answeredCount();
  const pct = Math.round((done/total)*100);
  const bricks = Array.from({length:8},(_,i)=>{
    const filled = (i < Math.round((pct/100)*8));
    return `<div class="tower-brick ${filled?'filled':''}"></div>`;
  }).join('');
  return `
    <div class="progress-outer">
      <div class="tower">${bricks}</div>
      <div class="progress-info">
        <div>Soalan ${state.qIndex+1} / ${total} &nbsp;·&nbsp; Dijawab: ${done}/${total}</div>
        <div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
      </div>
      <div class="points-badge">⭐ ${pointsEarned()} mata</div>
    </div>
  `;
}

function renderAnswerInputs(q,i){
  const val = state.answers[i];
  if(q.type==="essay"){
    const v = (typeof val==="string")? val : "";
    return `<textarea style="${q.short?'min-height:60px':''}" id="ans_${i}" placeholder="Taip jawapan anda di sini...">${escapeHtml(v)}</textarea>`;
  }
  if(q.type==="triple" || q.type==="quad" || q.type==="double"){
    const arr = Array.isArray(val)? val : q.labels.map(()=>"");
    return `<div class="${q.type==='double'?'row2':'row3'}">` + q.labels.map((lab,idx)=>`
      <div>
        <label class="sub">${lab}</label>
        <input type="text" id="ans_${i}_${idx}" value="${escapeHtml(arr[idx]||"")}" placeholder="Jawapan">
      </div>
    `).join('') + `</div>`;
  }
  return "";
}

function saveCurrentAnswer(){
  const q = QUESTIONS[state.qIndex];
  const i = state.qIndex;
  if(q.type==="essay"){
    const el = document.getElementById('ans_'+i);
    if(el) state.answers[i] = el.value;
  } else {
    const arr = q.labels.map((lab,idx)=>{
      const el = document.getElementById('ans_'+i+'_'+idx);
      return el ? el.value : "";
    });
    state.answers[i] = arr;
  }
}

function renderQuiz(){
  const i = state.qIndex;
  const q = QUESTIONS[i];
  const cls = bgClassForIndex(i);
  app.innerHTML = `
    <div class="title-banner">
      <div class="studs"><div class="stud"></div><div class="stud"></div><div class="stud"></div></div>
      <h1>🧱 MISI BENGKEL: TAYAR &amp; RODA</h1>
      <p>Bahagian ${q.bahagian} &nbsp;·&nbsp; ${HEADER_INFO.pentaksiran}</p>
    </div>
    ${renderProgress()}
    <div class="brick ${cls}">
      <div class="studs"><div class="stud"></div><div class="stud"></div><div class="stud"></div></div>
      <span class="section-label">Bahagian ${q.bahagian} · Soalan ${q.no}</span>
      <span class="badge-mark">${q.markah} markah · ${q.cog}</span>
      <h3>${q.title}</h3>
      <p>${q.html}</p>

        ${i===QUESTIONS.length-1
          ? `<button class="btn green" onclick="finishQuiz()">🏁 Selesai Misi</button>`
          : `<button class="btn" onclick="goNext()">Seterus ➡</button>`}
      </div>
    </div>
  `;
}

function goNext(){ saveCurrentAnswer(); state.qIndex++; render(); }
function goPrev(){ saveCurrentAnswer(); state.qIndex--; render(); }
function finishQuiz(){ saveCurrentAnswer(); state.screen="final"; render(); }

function escapeHtml(s){
  return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function renderFinal(){
  const done = answeredCount();
  const total = QUESTIONS.length;
  const pts = pointsEarned();
  let qaHtml = "";
  QUESTIONS.forEach((q,i)=>{
    const val = state.answers[i];
    let ansText = "";
    if(Array.isArray(val)) ansText = val.map((v,idx)=>`${q.labels[idx]} ${v||"(kosong)"}`).join("<br>");
    else ansText = (val && val.trim()) ? val.replace(/\n/g,"<br>") : "(kosong)";
    qaHtml += `<div class="qa-item"><b>Soalan ${q.no} (${q.markah}m):</b><br>${ansText}</div>`;
  });

  app.innerHTML = `
    <div class="title-banner">
      <div class="studs"><div class="stud"></div><div class="stud"></div><div class="stud"></div></div>
      <h1>🏆 MISI SELESAI!</h1>
      <p>Tahniah, ${escapeHtml(state.student.nama)}!</p>
    </div>
    <div class="final-summary">
      <div class="confetti-msg">🧱🎉 Anda kumpul <b>${pts} Lego Stud Points</b> daripada ${done}/${total} soalan dijawab!</div>
      <p style="text-align:center;color:#555;">Jawapan anda akan dipaparkan di bawah untuk semakan guru. Muat turun versi PDF rasmi untuk simpanan / cetak.</p>
      <div style="text-align:center;margin:16px 0;">
        <button class="btn green" id="btnHantar" onclick="hantarKeGoogleSheet()">☁️ Hantar &amp; Muat Turun Dokumen Rasmi</button>
        <button class="btn red" onclick="downloadPDF()">📄 PDF Ringkas (Tanpa Rekod)</button>
        <button class="btn grey" onclick="reviewAnswers()">🔍 Semak Jawapan</button>
      </div>
      <p style="text-align:center;font-size:.8em;color:#777;">
        Butang hijau: hantar jawapan ke Google Sheet guru + muat turun dokumen rasmi (Google Docs format).<br>
        Butang merah: hanya jana PDF terus di peranti anda, tiada rekod dihantar ke guru.
      </p>
      <div id="reviewBox" class="hidden">
        <h2>Ringkasan Jawapan</h2>
        ${qaHtml}
      </div>
    </div>
    <footer>KVBP · Jabatan Teknologi Mekanikal &amp; Pembuatan · Dijana secara automatik — bukan rekod rasmi sehingga disahkan guru.</footer>

}

function reviewAnswers(){
  document.getElementById('reviewBox').classList.toggle('hidden');
}

// ---------- PDF GENERATION ----------
function downloadPDF(){
  saveCurrentAnswer();
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({unit:"pt", format:"a4"});
  const pageW = doc.internal.pageSize.getWidth();
  const marginX = 40;
  let y = 40;

  function ensureSpace(h){
    if(y + h > 780){ doc.addPage(); y = 40; }
  }
  function heading(text, size=12, bold=true){
    doc.setFontSize(size);
    doc.setFont(undefined, bold? 'bold':'normal');
    doc.text(text, marginX, y);
    y += size*1.4;
  }
  function paragraph(text, size=10){
    doc.setFontSize(size);
    doc.setFont(undefined,'normal');
    const lines = doc.splitTextToSize(text, pageW - marginX*2);
    ensureSpace(lines.length*13+6);
    doc.text(lines, marginX, y);
    y += lines.length*13 + 6;
  }
  function hr(){
    doc.setDrawColor(180);
    doc.line(marginX, y, pageW-marginX, y);
    y += 12;
  }

  // ---- Header block ----
  doc.setFontSize(13);
  doc.setFont(undefined,'bold');
  doc.text("KOLEJ VOKASIONAL BATU PAHAT (KVBP)", pageW/2, y, {align:"center"}); y+=18;
  doc.setFontSize(11);
  doc.text("PENTAKSIRAN UJIAN 1", pageW/2, y, {align:"center"}); y+=20;

  doc.setFontSize(9);
  doc.setFont(undefined,'normal');
  const infoLines = [
    ["SEMESTER", HEADER_INFO.semester, "SESI", HEADER_INFO.sesi.replace('SESI ','')],
    ["JABATAN", HEADER_INFO.jabatan],
    ["PROGRAM", HEADER_INFO.program],
    ["KOD / KURSUS", HEADER_INFO.kod],
    ["KOMPETENSI", HEADER_INFO.kompetensi],
    ["HASIL PEMBELAJARAN", HEADER_INFO.hasilPembelajaran],
    ["PENTAKSIRAN", HEADER_INFO.pentaksiran + "   |   MASA: " + HEADER_INFO.masa],
    ["NO. KOD", HEADER_INFO.noKod],
  ];
  infoLines.forEach(row=>{
    ensureSpace(24);
    doc.setFont(undefined,'bold');
    doc.text(row[0]+":", marginX, y);
    doc.setFont(undefined,'normal');
    const txt = row.slice(1).join("   ");
    const lines = doc.splitTextToSize(txt, pageW-marginX*2-120);
    doc.text(lines, marginX+120, y);
    y += Math.max(14, lines.length*12)+2;
  });

  y+=6; hr();
  doc.setFont(undefined,'bold');
  doc.text("MAKLUMAT CALON", marginX, y); y+=16;
  doc.setFont(undefined,'normal');
  doc.text("NAMA: " + state.student.nama, marginX, y); y+=16;
  doc.text("ANGKA GILIRAN: " + (state.student.angka||"-"), marginX, y); y+=16;
  doc.text("MARKAH DIPEROLEH: _______ / " + TOTAL_MARKS, marginX, y); y+=20;
  hr();

  heading("ARAHAN KEPADA CALON:", 10);
  paragraph("Kertas penilaian ini mengandungi 2 Bahagian. Jawab semua soalan.");
  y+=6;

  let currentBahagian = null;

  QUESTIONS.forEach((q,i)=>{
    if(q.bahagian !== currentBahagian){
      currentBahagian = q.bahagian;
      ensureSpace(30);
      y+=6;
      doc.setFillColor(230,230,230);
      doc.rect(marginX, y-12, pageW-marginX*2, 20, 'F');
      doc.setFont(undefined,'bold');
      doc.setFontSize(11);
      const totalB = QUESTIONS.filter(qq=>qq.bahagian===q.bahagian).reduce((s,qq)=>s+qq.markah,0);
      doc.text(`BAHAGIAN ${q.bahagian}: JAWAB SEMUA SOALAN (${totalB} MARKAH)`, marginX+4, y+2);
      y+=24;
    }

    ensureSpace(30);
    doc.setFont(undefined,'bold');
    doc.setFontSize(10.5);
    doc.text(`Soalan ${q.no} (${q.markah} markah - ${q.cog})`, marginX, y);
    y+=16;

    // strip simple html tags for pdf text
    const plainQ = q.html.replace(/<br>/g,' ').replace(/<[^>]+>/g,'');
    paragraph(plainQ, 10);

    if(q.img){
      ensureSpace(160);
      try{
        doc.addImage(IMG[q.img], 'JPEG', marginX, y, 220, 140, undefined, 'FAST');
        doc.setFontSize(8.5);
        doc.text(q.imgCaption, marginX, y+152);
        y+=165;
      }catch(e){ /* ignore if fails */ }
    }

    const val = state.answers[i];
    doc.setFont(undefined,'bold');
    doc.setFontSize(9.5);
    ensureSpace(14);
    doc.text("Jawapan Calon:", marginX, y); y+=13;
    doc.setFont(undefined,'normal');

    if(Array.isArray(val)){
      q.labels.forEach((lab,idx)=>{
        const txt = `${lab} ${val[idx]||"........................................"}`;
        paragraph(txt, 9.5);
      });
    } else {
      const txt = (val && val.trim()) ? val : "........................................................................";
      paragraph(txt, 9.5);
    }
    y+=8;
    ensureSpace(4);
    doc.setDrawColor(220);
    doc.line(marginX, y, pageW-marginX, y);
    y+=14;
  });

  ensureSpace(60);
  y+=10;
  doc.setFont(undefined,'bold');
  doc.setFontSize(10);
  doc.text("DISEDIAKAN OLEH: ......................................", marginX, y);
  doc.text("DISAHKAN OLEH: ......................................", marginX+280, y);
  y+=16;
  doc.setFont(undefined,'normal');
  doc.setFontSize(9);
  doc.text("(PENTAKSIR)   TARIKH: ................", marginX, y);
  doc.text("(KETUA PROGRAM)   TARIKH: ................", marginX+280, y);

  const fname = "UJIAN1_DMD3143_" + (state.student.nama||"pelajar").replace(/[^a-z0-9]+/gi,'_') + ".pdf";
  doc.save(fname);
}

render();
